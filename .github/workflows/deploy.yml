name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # manual deploys from the Actions tab — handy for server moves

# Cancel superseded runs (e.g. rapid consecutive pushes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_PATH: /var/www/portfolio

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # npm ci's postinstall downloads a Chrome build for the prerender step;
      # restore it first so npm ci can skip re-fetching ~200MB on every run.
      - name: Cache Puppeteer's Chrome download
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present
        continue-on-error: true # TODO: remove once lint is clean so CI actually enforces it

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://michaelwilke.com

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: dist/

      # Upload to a staging dir so a failed transfer never touches the live site
      - name: Upload build to staging directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "dist/*"
          target: ${{ env.DEPLOY_PATH }}-staging
          strip_components: 1
          rm: true # clean staging dir first so stale hashed assets never accumulate

      # Atomic swap: old site stays live until the instant of the mv
      - name: Activate new release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            DEPLOY=${{ env.DEPLOY_PATH }}
            rm -rf "$DEPLOY-old"
            [ -d "$DEPLOY" ] && mv "$DEPLOY" "$DEPLOY-old"
            mv "$DEPLOY-staging" "$DEPLOY"
            sudo systemctl reload nginx
            echo "Deployed. Previous release kept at $DEPLOY-old for rollback."
